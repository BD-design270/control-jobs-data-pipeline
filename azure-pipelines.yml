trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

steps:
  - task: UsePythonVersion@0
    displayName: Use Python 3.12
    inputs:
      versionSpec: "3.12"

  - script: |
      python -m pip install --upgrade pip
      python -m pip install -r requirements.txt
    displayName: Install dependencies

  - script: python src/generate_data.py
    displayName: Generate synthetic control-job data

  - script: python src/run_pipeline.py
    displayName: Build reporting pipeline

  - script: python -m pytest tests -v
    displayName: Run data-quality tests

  - task: PublishPipelineArtifact@1
    displayName: Publish reporting output
    inputs:
      targetPath: output
      artifact: control-job-report
